@if (isVisible) {
  <div class="evaluator-teaser mat-elevation-z8">
    <button
      class="close-button"
      mat-icon-button
      type="button"
      (click)="onDismiss()"
    >
      <mat-icon>close</mat-icon>
    </button>

    <p class="label">AgentForge Week 2 demo</p>

    <button
      class="demo-button"
      color="primary"
      mat-flat-button
      type="button"
      (click)="onOpenDemo()"
    >
      Open demo portfolio
    </button>

    <p class="hint">Find the AI agent under <strong>Portfolio → Agent</strong></p>
    <p class="token">Access token: <code>ghostfolio-demo-access-token</code></p>
  </div>
}
