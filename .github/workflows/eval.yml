name: Eval (Golden Set)

on:
  push:
    paths:
      - 'apps/api/src/app/endpoints/agent/**'
  pull_request:
    paths:
      - 'apps/api/src/app/endpoints/agent/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Golden Set evals
        id: run_eval
        continue-on-error: true
        run: |
          npx dotenv-cli -e .env.example -- npx nx test api --testPathPattern=eval --ci --verbose --json --outputFile=eval-results.json

      - name: Summarize eval results
        id: summarize
        if: always()
        shell: bash
        run: |
          node -e "const fs=require('fs'); let total=0, passed=0, failed=0, passRate='0.0'; let status='no-results'; if (fs.existsSync('eval-results.json')) { const r=JSON.parse(fs.readFileSync('eval-results.json','utf8')); total=r.numTotalTests ?? 0; passed=r.numPassedTests ?? 0; failed=r.numFailedTests ?? 0; passRate= total>0 ? ((passed/total)*100).toFixed(1) : '0.0'; status='ok'; } fs.appendFileSync(process.env.GITHUB_OUTPUT, `status=${status}\n`); fs.appendFileSync(process.env.GITHUB_OUTPUT, `total=${total}\n`); fs.appendFileSync(process.env.GITHUB_OUTPUT, `passed=${passed}\n`); fs.appendFileSync(process.env.GITHUB_OUTPUT, `failed=${failed}\n`); fs.appendFileSync(process.env.GITHUB_OUTPUT, `pass_rate=${passRate}\n`);"

      - name: Comment eval pass rate on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          EVAL_STATUS: ${{ steps.summarize.outputs.status }}
          EVAL_TOTAL: ${{ steps.summarize.outputs.total }}
          EVAL_PASSED: ${{ steps.summarize.outputs.passed }}
          EVAL_FAILED: ${{ steps.summarize.outputs.failed }}
          EVAL_PASS_RATE: ${{ steps.summarize.outputs.pass_rate }}
        with:
          script: |
            const marker = '<!-- eval-pass-rate-comment -->';
            const outcome = '${{ steps.run_eval.outcome }}';
            const status = process.env.EVAL_STATUS;
            const total = process.env.EVAL_TOTAL;
            const passed = process.env.EVAL_PASSED;
            const failed = process.env.EVAL_FAILED;
            const passRate = process.env.EVAL_PASS_RATE;
            const icon = outcome === 'success' ? 'PASS' : 'FAIL';
            const headline = outcome === 'success' ? 'Eval suite passed' : 'Eval suite failed';
            const body = `${marker}
            ## ${icon} Golden Set Eval Summary
            - Result: **${headline}**
            - Pass rate: **${passRate}%** (${passed}/${total})
            - Failed tests: **${failed}**
            - Parsed results file: **${status}**

            Workflow: \`${context.workflow}\` · Run: #${context.runNumber}`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.data.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Fail workflow when evals fail
        if: always() && steps.run_eval.outcome == 'failure'
        run: exit 1
