name: Eval (Golden Set)

on:
  push:
    paths:
      - 'apps/api/src/app/endpoints/agent/**'
  pull_request:
    paths:
      - 'apps/api/src/app/endpoints/agent/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Golden Set evals
        run: npx dotenv-cli -e .env.example -- npx nx test api --testPathPattern=eval --ci --verbose
